name: CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
      - name: Setup Node v24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'
      - name: Setup Supabase v2.108.0
        uses: supabase/setup-cli@v1
        with:
          version: 2.108.0
      - name: Install dependencies
        run: |
          pnpm install
          pnpx playwright install --with-deps
      - name: Start database
        run: |
          supabase start
          supabase db reset
      - name: Set environment variables
        run: |
          supabase status --output env > .env.supabase
          node convert_env.js < .env.supabase > .env
          rm .env.supabase
          test -s .env
      - name: Install again, just in case
        run: npx playwright install
      - run: pnpm run test:unit
      - run: pnpm test
  check-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
      - name: Setup Node v24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'
      - name: Setup Supabase v2.108.0
        uses: supabase/setup-cli@v1
        with:
          version: 2.108.0
      - name: Install dependencies
        run: pnpm install
      - name: Start database
        run: |
          supabase db start
          supabase db reset
      - name: Verify generated types match Postgres schema
        run: |
          supabase gen types typescript --local > src/lib/supabase.d.ts
          node -e "const fs=require('node:fs'); const p='src/lib/supabase.d.ts'; fs.writeFileSync(p, fs.readFileSync(p, 'utf8').trimEnd() + '\n');"
          if ! git diff --ignore-space-at-eol --exit-code --quiet src/lib/supabase.d.ts; then
              {
                echo "Detected uncommitted changes after build. See status below:"
                echo '```diff'
                git diff -- src/lib/supabase.d.ts
                echo '```'
              } >> "$GITHUB_STEP_SUMMARY"
              exit 1
          fi
