packages:
  - '.'
overrides:
  'yaml@>=2.0.0 <2.8.3': '>=2.8.3'
  'flatted@<=3.4.1': '>=3.4.2'
allowBuilds:
  '@sveltejs/kit': true
  esbuild: true
  svelte-preprocess: true
  # Only runs an optional OpenCollective message; OCR works without it.
  tesseract.js: false
onlyBuiltDependencies:
  - '@sveltejs/kit'
  - esbuild
  - svelte-preprocess
